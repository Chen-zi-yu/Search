<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ ITZY 拆卡對帳查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* 【可更動】全域變數區：在此修改配色方案 */
  :root {
    --rose: #f2a7c3; --rose-light: #fce8f1; --rose-mid: #e8799f; --rose-deep: #c45a7e;
    --cream: #fdf6f9; --lavender: #e8e0f5; --lavender-mid: #b8a9d9;
    --gold: #d4a853; --gold-light: #fdf3dc;
    --text-dark: #2d1f2e; --text-mid: #6b4c60; --text-light: #a07a8e;
    --border: rgba(242,167,195,0.3); --white: #ffffff;
    --green: #5aab7a; --green-light: #eaf5ef;
    --red-light: #fdeef3; --orange: #e08a3c; --orange-light: #fdf0e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

  /* 頁首樣式 */
  header {
    background: linear-gradient(135deg, #fce8f1 0%, #f0e8fa 50%, #fce8f1 100%);
    border-bottom: 1px solid var(--border); padding: 2rem 1.5rem 1.5rem; text-align: center;
  }
  header::before {
    content: '✦  ✧  ✦  ✧  ✦  ✧  ✦  ✧  ✦  ✧  ✦';
    display: block; font-size: 10px; letter-spacing: 6px; color: var(--rose-mid); margin-bottom: 1rem; opacity: 0.6;
  }
  .site-title { font-family:'Playfair Display',serif; font-size:clamp(1.5rem,4vw,2.2rem); color:var(--rose-deep); letter-spacing:2px; }
  .site-sub { font-size:0.75rem; color:var(--text-light); margin-top:0.4rem; letter-spacing:4px; text-transform:uppercase; }

  /* 【可更動】Banner 按鈕連結 */
  .kpop-banner {
    max-width:680px; margin:1.2rem auto 0;
    background:linear-gradient(90deg,#f0e8fa,#fce8f1);
    border:1px solid rgba(184,169,217,0.5); border-radius:50px;
    padding:0.6rem 1.4rem; display:flex; align-items:center; justify-content:center;
    gap:0.6rem; text-decoration:none; transition:box-shadow 0.2s,transform 0.2s;
  }
  .kpop-banner:hover { box-shadow:0 4px 18px rgba(184,169,217,0.4); transform:translateY(-2px); }
  .kpop-banner .banner-text { font-size:0.82rem; color:var(--text-mid); font-weight:500; }

  /* ====================================================================
     【意見回饋區】樣式
     可更動項目：
       - .feedback-bar：未點擊時顯示的小提示框外觀（顏色、圓角、間距）
       - .feedback-modal：點擊後跳出的全螢幕遮罩
       - .feedback-box：跳出視窗本體的外觀
     ==================================================================== */
  .feedback-bar {
    max-width:680px; margin:0.9rem auto 0;
    background:var(--white); border:1.5px dashed var(--rose);
    border-radius:50px; padding:0.55rem 1.4rem;
    display:flex; align-items:center; justify-content:center; gap:0.6rem;
    cursor:pointer; transition:box-shadow 0.2s,transform 0.2s,background 0.2s;
  }
  .feedback-bar:hover { box-shadow:0 4px 18px rgba(242,167,195,0.35); transform:translateY(-2px); background:var(--rose-light); }
  .feedback-bar .fb-icon { font-size:1rem; }
  .feedback-bar .fb-text { font-size:0.82rem; color:var(--text-mid); font-weight:500; }

  /* 跳出視窗的半透明背景遮罩 */
  .feedback-modal {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(45,31,46,0.55); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center;
    z-index:2000; opacity:0; pointer-events:none; transition:opacity 0.3s ease;
    padding:1.2rem;
  }
  .feedback-modal.active { opacity:1; pointer-events:auto; }

  /* 跳出視窗本體 */
  .feedback-box {
    background:var(--cream); border-radius:20px; padding:1.6rem 1.5rem;
    width:100%; max-width:420px; box-shadow:0 20px 50px rgba(0,0,0,0.25);
    transform:scale(0.94); transition:transform 0.3s ease;
  }
  .feedback-modal.active .feedback-box { transform:scale(1); }
  .feedback-box h3 { font-family:'Playfair Display',serif; color:var(--rose-deep); font-size:1.2rem; margin-bottom:0.3rem; }
  .feedback-box .fb-sub { font-size:0.78rem; color:var(--text-light); margin-bottom:1rem; line-height:1.6; }
  .feedback-box textarea {
    width:100%; min-height:110px; border:1.5px solid var(--border); border-radius:14px;
    padding:0.8rem 1rem; font-family:'Noto Sans TC',sans-serif; font-size:0.9rem;
    color:var(--text-dark); resize:vertical; outline:none; transition:border-color 0.2s;
  }
  .feedback-box textarea:focus { border-color:var(--rose); }
  .feedback-box input[type="text"] {
    width:100%; border:1.5px solid var(--border); border-radius:50px;
    padding:0.6rem 1rem; font-family:'Noto Sans TC',sans-serif; font-size:0.85rem;
    color:var(--text-dark); outline:none; margin-bottom:0.7rem; transition:border-color 0.2s;
  }
  .feedback-box input[type="text"]:focus { border-color:var(--rose); }
  .feedback-actions { display:flex; justify-content:flex-end; gap:0.6rem; margin-top:1rem; }
  .fb-btn {
    font-family:'Noto Sans TC',sans-serif; font-size:0.85rem; font-weight:600;
    padding:0.5rem 1.2rem; border-radius:50px; cursor:pointer; border:none; transition:transform 0.15s,box-shadow 0.15s;
  }
  .fb-btn-cancel { background:transparent; color:var(--text-light); }
  .fb-btn-cancel:hover { color:var(--text-mid); }
  .fb-btn-submit { background:var(--rose); color:white; }
  .fb-btn-submit:hover { box-shadow:0 4px 14px rgba(242,167,195,0.5); transform:translateY(-1px); }
  .fb-status { font-size:0.78rem; margin-top:0.6rem; min-height:1.2em; }
  .fb-status.ok { color:var(--green); }
  .fb-status.err { color:var(--rose-deep); }

  /* 搜尋列區域 */
  .search-wrap { max-width:640px; margin:1.8rem auto 0; padding:0 1.5rem; }
  .search-box {
    display:flex; align-items:center; background:var(--white);
    border:1.5px solid var(--rose); border-radius:50px; padding:0.6rem 1.2rem; gap:0.75rem;
    box-shadow:0 4px 20px rgba(242,167,195,0.2); transition:box-shadow 0.2s;
  }
  .search-box:focus-within { box-shadow:0 4px 28px rgba(242,167,195,0.4); }
  .search-icon { font-size:1.1rem; opacity:0.5; }
  .search-box input { flex:1; border:none; outline:none; font-family:'Noto Sans TC',sans-serif; font-size:0.95rem; color:var(--text-dark); background:transparent; }
  .search-box input::placeholder { color:var(--text-light); }
  .clear-btn { background:none; border:none; cursor:pointer; color:var(--text-light); font-size:1rem; padding:2px 6px; border-radius:50%; transition:color 0.2s; display:none; }
  .clear-btn:hover { color:var(--rose-deep); }

  /* 搜尋建議選單 */
  .suggestions { max-width:640px; margin:0 auto; padding:0 1.5rem; position:relative; }
  .suggest-list {
    position:absolute; top:4px; left:1.5rem; right:1.5rem;
    background:var(--white); border:1px solid var(--border); border-radius:14px;
    overflow:hidden; box-shadow:0 8px 24px rgba(196,90,126,0.12); z-index:100;
  }
  .suggest-item { padding:0.6rem 1.1rem; cursor:pointer; font-size:0.88rem; color:var(--text-dark); transition:background 0.15s; border-bottom:1px solid var(--rose-light); }
  .suggest-item:last-child { border-bottom:none; }
  .suggest-item:hover { background:var(--rose-light); }

  /* 主內容區 */
  .main { max-width:900px; margin:0 auto; padding:2rem 1.5rem 4rem; }
  .state-msg { text-align:center; padding:4rem 2rem; color:var(--text-light); }
  .state-msg .big-icon { font-size:3rem; margin-bottom:1rem; }
  .state-msg p { font-size:0.9rem; line-height:1.8; }

  /* 顧客資訊面板 */
  .customer-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
  .avatar {
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg,var(--rose),var(--lavender-mid));
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; color:white; font-weight:700; flex-shrink:0;
  }
  .customer-name { font-size:1.2rem; font-weight:700; color:var(--text-dark); }
  .customer-tag { font-size:0.75rem; color:var(--text-light); margin-top:3px; }
  .pay-badge { display:inline-block; font-size:0.85rem; padding:4px 15px; border-radius:20px; font-weight:600; margin-top:4px; }
  .pay-匯款 { background:var(--gold-light); color:var(--gold); border:1px solid rgba(212,168,83,0.3); }
  .pay-貨付 { background:var(--green-light); color:var(--green); border:1px solid rgba(90,171,122,0.3); }
  .pay-無卡 { background:var(--lavender); color:var(--lavender-mid); border:1px solid rgba(184,169,217,0.5); }
  .pay-尚有未付款 { background:var(--red-light); color:var(--rose-deep); border:1px solid rgba(196,90,126,0.3); }

  /* 金額統計卡片 */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem; margin-bottom:2rem; }
  .summary-card { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:1rem 1.1rem; text-align:center; }
  .summary-card .label { font-size:0.7rem; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-bottom:0.4rem; }
  .summary-card .value { font-size:1.25rem; font-weight:700; color:var(--text-dark); }
  .summary-card.paid .value { color:var(--green); }
  .summary-card.unpaid .value { color:var(--rose-deep); }

  /* 明細列表樣式 */
  .section-title { font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; color:var(--text-light); margin-bottom:1rem; display:flex; align-items:center; gap:0.75rem; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .items-list { display:flex; flex-direction:column; gap:0.6rem; }
  .item-row {
    background: var(--white); 
    border: 1px solid var(--border); 
    border-radius: 18px;
    padding: 0.9rem 1.2rem; 
    display: flex; 
    align-items: flex-start; 
    gap: 1rem;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: default;
  }

  /* 移除 hover 時的特殊背景色 */
  .item-row:hover {
    transform: translateX(6px);
    box-shadow: 0 4px 18px rgba(242,167,195,0.18);
    background: var(--white); 
  }

  /* 【可更動】可點擊連到圖鑑(gallery.html)的品項列額外樣式 */
  .item-row.clickable { cursor:pointer; }
  .item-row.clickable .item-desc { text-decoration: none; }
  .item-link-hint {
    font-size:0.68rem; color:var(--lavender-mid); margin-top:4px;
    display:inline-flex; align-items:center; gap:3px; letter-spacing:0.5px;
  }

  /* 移除偶數行的特殊背景色 */
  .items-list > .item-row:nth-child(even) {
    background: var(--white);
  }
  .item-number {
    font-size:1.1rem; flex-shrink:0; margin-top:1px; line-height:1;
    user-select:none;
  }
  .item-desc { flex:1; font-size:0.88rem; color:var(--text-dark); line-height:1.6; }
  .item-confirm { font-size:0.7rem; color:var(--text-light); margin-top:3px; letter-spacing:0.5px; }

  /* 底部導引區 */
  .catalog-section {
    margin-top:2rem; background:linear-gradient(135deg,#f0e8fa,#fce8f1);
    border:1px solid rgba(184,169,217,0.4); border-radius:16px;
    padding:1.2rem 1.4rem; display:flex; align-items:center; justify-content:space-between; gap:1rem;
  }
  .catalog-info .catalog-label { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--lavender-mid); margin-bottom:0.3rem; }
  .catalog-info .catalog-title { font-size:1rem; font-weight:600; color:var(--text-mid); }
  .catalog-info .catalog-sub { font-size:0.78rem; color:var(--text-light); margin-top:2px; }
  .catalog-btn {
    background:var(--white); border:1px solid rgba(184,169,217,0.5); color:var(--text-mid);
    font-family:'Noto Sans TC',sans-serif; font-size:0.82rem; font-weight:500;
    padding:0.5rem 1.1rem; border-radius:50px; cursor:pointer; text-decoration:none; white-space:nowrap;
    transition:box-shadow 0.2s,transform 0.2s; display:inline-block;
  }
  .catalog-btn:hover { box-shadow:0 4px 14px rgba(184,169,217,0.35); transform:translateY(-1px); }

  .remark-box { margin-top:0.75rem; background:var(--gold-light); border:1px solid rgba(212,168,83,0.25); border-radius:10px; padding:0.6rem 1rem; font-size:0.8rem; color:var(--text-mid); line-height:1.6; }
  .remark-label { font-size:0.68rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:3px; }

  /* 診斷面板樣式 */
  .debug-panel {
    background:#1a1a2e; color:#a0c4ff; font-family:monospace; font-size:0.72rem;
    border-radius:12px; padding:1rem; margin-bottom:1.5rem; max-height:200px; overflow-y:auto; line-height:1.8;
  }
  .debug-panel .d-label { color:#ff9de2; font-weight:bold; }
  .debug-toggle { background:none; border:1px solid var(--border); color:var(--text-light); font-size:0.72rem; padding:3px 10px; border-radius:20px; cursor:pointer; margin-bottom:0.5rem; }

  /* 載入與結果提示 */
  .loading { text-align:center; padding:3rem; color:var(--text-light); }
  .loading-dots span { display:inline-block; width:8px; height:8px; background:var(--rose); border-radius:50%; margin:0 3px; animation:bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay:0.2s; }
  .loading-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-8px);opacity:1} }
  .no-result { text-align:center; padding:3rem 1rem; color:var(--text-light); font-size:0.9rem; }

  footer { text-align:center; padding:1.5rem; font-size:0.72rem; color:var(--text-light); letter-spacing:2px; border-top:1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="site-title">✦ ITZY 拆卡對帳查詢</div>
  <div class="site-sub">MOTTO × 簽售拆卡</div>
  <a class="kpop-banner" href="https://chen-zi-yu.github.io/ITZY/" target="_blank" rel="noopener">
    <span>📸</span>
    <span class="banner-text">前往 ITZY 小卡圖鑑，查看所有小卡照片 →</span>
  </a>

  <!-- ====================================================================
       【意見回饋區】觸發按鈕
       點擊後會打開下方的 #feedbackModal 跳出視窗。
       想調整顯示文字，直接修改下面 .fb-text 裡的文字即可。
       ==================================================================== -->
  <div class="feedback-bar" onclick="openFeedback()">
    <span class="fb-icon">💬</span>
    <span class="fb-text">點此留下您的意見或建議</span>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="輸入拆卡者名稱搜尋…" autocomplete="off" />
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>
</header>

<div class="suggestions"><div class="suggest-list" id="suggestList" style="display:none"></div></div>

<div class="main" id="mainContent">
  <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><p style="margin-top:1rem;font-size:0.85rem">載入中…</p></div>
</div>

<footer>✦ &nbsp; ITZY MIDZY 날자 &nbsp; ✦</footer>

<!-- ====================================================================
     【意見回饋區】跳出視窗本體
     可更動項目：
       - h3 / .fb-sub 文字：跳出視窗的標題與說明文字
       - placeholder：輸入框的提示文字
       - submitFeedback() 函式（在下方 JS 程式碼中）：決定送出後資料要去哪裡
     ==================================================================== -->
<div class="feedback-modal" id="feedbackModal" onclick="if(event.target===this) closeFeedback()">
  <div class="feedback-box">
    <h3>💬 意見回饋</h3>
    <div class="fb-sub">有任何想法、錯誤回報或建議都歡迎留言給我們，謝謝您的支持 🌸</div>
    <input type="text" id="fbName" placeholder="您的稱呼（選填）" autocomplete="off" />
    <textarea id="fbMessage" placeholder="請輸入您想提供的意見……"></textarea>
    <div class="fb-status" id="fbStatus"></div>
    <div class="feedback-actions">
      <button class="fb-btn fb-btn-cancel" onclick="closeFeedback()">取消</button>
      <button class="fb-btn fb-btn-submit" onclick="submitFeedback()">送出</button>
    </div>
  </div>
</div>

<script>
/* 【可更動】設定您的 Google Sheet 發布連結 (CSV 格式) */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQaeOLMSqtncdw8BNX3g1ullp-ala-D1-qVhFPMPcKWH_M53UJwQaQ0R2OfZlwMIx9KEwOlHkIiZcHD/pub?gid=0&single=true&output=csv';
/* 【可更動】設定導引按鈕的連結 */
const CATALOG_URL   = 'https://chen-zi-yu.github.io/ITZY/';

/* ====================================================================
   【意見回饋區】設定
   目前為「佔位狀態」：尚未連接任何真正能收信的服務，送出時只會在畫面顯示
   提示文字，並把內容印在瀏覽器 Console，方便您測試畫面操作。

   ▶ 之後想要串接 Google 表單，請依下列步驟調整：
     1. 到 Google 表單後台，點選右上角「⋮」→「取得預先填入的連結」，
        或在表單頁面打開「檢視原始碼」找到 action="https://docs.google.com/forms/d/e/xxxxxxxx/formResponse"
        把該網址填入下面 FEEDBACK_FORM_ACTION_URL。
     2. 在表單編輯模式，把滑鼠移到「意見內容」題目上，打開瀏覽器開發者工具(F12)，
        找到 <input> 或 <textarea> 的 name="entry.123456789"，
        把數字部分填入下面 FEEDBACK_FIELD_MESSAGE。
     3. 同樣方式找出「稱呼/姓名」題目的 entry 編號，填入 FEEDBACK_FIELD_NAME。
        如果表單沒有姓名欄位，可以保持空字串 '' 不填。
     4. 把下面的 FEEDBACK_ENABLED 改成 true，即可正式啟用送出功能。
   ==================================================================== */
const FEEDBACK_ENABLED          = false;   // 【可更動】串接好表單後，把這裡改成 true
const FEEDBACK_FORM_ACTION_URL  = '';      // 【可更動】填入 Google 表單的 formResponse 網址
const FEEDBACK_FIELD_MESSAGE    = '';      // 【可更動】填入「意見內容」欄位的 entry 編號，例如 'entry.111111'
const FEEDBACK_FIELD_NAME       = '';      // 【可更動】填入「稱呼/姓名」欄位的 entry 編號（沒有此欄位可留空）

/* ====================================================================
   【拆卡明細 → 圖鑑(gallery.html)連結】設定

   每一筆拆卡品項都是從 Google Sheet 抓來的「自由文字」（例如：
   "MS1.0 線上食譜留娜 匯款"），無法100%精準對應到 gallery.html 裡的相簿，
   因此採用「關鍵字比對」：只要品項文字中包含某組關鍵字，就視為命中
   對應的相簿，點擊後會跳到 gallery.html?id=xxx&album=yyy。

   ⚠ 注意：gallery.html 本身不會被修改（保持原檔案不變），而它原本的
   設計是「網址沒帶 id/album 參數，或參數對不到，就顯示『找不到該分組
   相簿』」。為了避免使用者點下去看到錯誤訊息，當所有關鍵字都比對不到
   時，會改連到下面 GALLERY_FALLBACK_URL 指定的「預設相簿」，而不是
   連到完全空白的 gallery.html。

   ▶ 如何新增/調整對照規則：
     在下面 GALLERY_LINK_RULES 陣列中新增一筆物件即可，格式為：
       { keywords: ['關鍵字1','關鍵字2'], id: 'gallery.html中的id', album: 'gallery.html中的album' }
     - keywords：陣列中只要有任何一個關鍵字出現在品項文字裡就算命中
                 （比對時會忽略大小寫與全形/半形空白）
     - id / album：要對應到 gallery.html 的 photosDatabase 裡的哪一組
                   key（請打開 gallery.html 內的 photosDatabase 物件確認
                   目前有哪些 id 與 album 可用，例如 motto.offline、
                   motto.album、motto.popup、gold.gold...）
     - 比對順序：陣列「越前面優先比對」，所以越精確、越具體的關鍵字
                 規則請放在陣列前面，越廣泛的規則放後面。

   ▶ 如何調整「比對不到時」要連去哪個預設相簿：
     修改下面 GALLERY_FALLBACK_URL 的 id 與 album 參數即可，
     例如想改成導向 GOLD 專輯相簿，就改成：
       'gallery.html?id=gold&album=gold'
   ==================================================================== */
const GALLERY_PAGE_URL     = 'https://chen-zi-yu.github.io/ITZY/gallery.html'; // 【可更動】若 gallery.html 路徑不同，改這裡
const GALLERY_FALLBACK_URL = 'https://chen-zi-yu.github.io/ITZY/gallery.html?id=motto&album=offline'; // 【可更動】比對不到時的預設相簿連結

const GALLERY_LINK_RULES = [
  // ── Motto 系列：線下簽售 / 線上抽選相關關鍵字 ──
  { keywords: ['線下','BDM','WM1.0','WM2.0','MS1.0','MS2.0','MS3.0','末場','SR1.0','上海','香港'], id: 'motto', album: 'offline' },
  // ── Motto 系列：快閃店周邊 ──
  { keywords: ['快閃店','快閃','周邊','鑰匙圈','紙膠帶'], id: 'motto', album: 'popup' },
  // ── Motto 系列：專輯內頁配置 ──
  { keywords: ['單封','PhotoBook','POCA','特別版','磁帶'], id: 'motto', album: 'album' },
  // ── GOLD 專輯 ──
  { keywords: ['GOLD','金專'], id: 'gold', album: 'gold' },
  // 【可更動】要新增其他系列，依照上面格式繼續往下加一行即可
];

// 將文字正規化（去除空白、轉小寫），方便關鍵字比對
function normalizeForMatch(s) {
  return (s || '').replace(/[\s\u3000\ufeff]/g, '').toLowerCase();
}

// 依照拆卡品項文字，找出對應的 gallery.html 連結網址
function getGalleryLinkForItem(itemText) {
  const target = normalizeForMatch(itemText);
  for (const rule of GALLERY_LINK_RULES) {
    const hit = rule.keywords.some(k => target.includes(normalizeForMatch(k)));
    if (hit) {
      return `${GALLERY_PAGE_URL}?id=${encodeURIComponent(rule.id)}&album=${encodeURIComponent(rule.album)}`;
    }
  }
  // 比對不到任何關鍵字時，導向預設相簿（而非完全空白的 gallery.html）
  return GALLERY_FALLBACK_URL;
}

async function submitFeedback() {
  const msg = document.getElementById('fbMessage').value.trim();
  const name = document.getElementById('fbName').value.trim();
  const statusEl = document.getElementById('fbStatus');

  if (!msg) {
    statusEl.textContent = '請輸入意見內容後再送出 🌸';
    statusEl.className = 'fb-status err';
    return;
  }

  // ── 尚未啟用串接時的「佔位」行為：僅顯示提示、印在 Console，方便測試畫面 ──
  if (!FEEDBACK_ENABLED || !FEEDBACK_FORM_ACTION_URL) {
    console.log('[意見回饋- 佔位測試]', { name, msg });
    statusEl.textContent = '（測試模式）尚未連接表單，內容已印在瀏覽器 Console。';
    statusEl.className = 'fb-status ok';

    // Google 表單的 formResponse 端點不支援 CORS 讀取回應，
    // 這裡用 'no-cors' 模式送出：瀏覽器看不到回應內容，但表單仍會正常收到資料。
    await fetch(FEEDBACK_FORM_ACTION_URL, {

  }
}

let allData   = [];
let headers   = [];
let rawLines  = [];
let debugInfo = [];
let searchTimeout = null;

// ── 核心邏輯：字串正規化處理 ──
function normalize(s) {
  return (s||'').replace(/[\s\u3000\ufeff]/g,'').toLowerCase();
}
// ── 核心邏輯：欄位名稱比對 ──
function findCol(hdrs, ...keywords) {
  for (const k of keywords) {
    const kn = normalize(k);
    const idx = hdrs.findIndex(h => normalize(h).includes(kn));
    if (idx !== -1) return hdrs[idx];
  }
  return null;
}

// ── 核心邏輯：CSV 字串轉陣列解析器 ──
function parseCSVFull(text) {
  const cleaned = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < cleaned.length; i++) {
    const c = cleaned[i];
    if (c === '"') {
      if (inQ && cleaned[i+1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(cell); cell = '';
    } else if (c === '\n' && !inQ) {
      row.push(cell); rows.push(row); row = []; cell = '';
    } else {
      cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ── 核心邏輯：金額處理 ──
function parseMoney(str) {
  if (!str) return 0;
  return parseInt(String(str).replace(/[^0-9]/g,'')) || 0;
}

// ====================================================================
// 【從 Google Sheet 抓取與載入資料】
// 抓取策略採「多重備援」：依序嘗試下面 FETCH_STRATEGIES 中的每一種方式，
// 只要有一種成功讀到內容（且能解析出標題列），就採用該結果，不再往下試。
//
// 為什麼要這樣設計？
//   Google 試算表用「發布為網頁 → CSV」產生的連結，回應通常已經允許
//   瀏覽器跨網域讀取，所以「直接 fetch」多數時候就能成功，不需要繞道
//   第三方 CORS 代理。但偶爾仍會因瀏覽器、網路環境而失敗，這時才需要
//   靠代理服務協助轉接。免費代理服務（如 corsproxy.io）常會無預警
//   失效、降速或開始要求付費，所以這裡同時準備了多個代理當備援，
//   而不是只依賴單一個。
//
// ▶ 如果之後又出現「抓不到資料」的情況，可以這樣排查／調整：
//   1. 打開瀏覽器開發者工具(F12) → Console，看是哪一個策略失敗、
//      錯誤訊息是什麼（每個策略都會印出 [loadSheet] 開頭的訊息）。
//   2. 如果是某個代理網址失效，可以直接刪除 FETCH_STRATEGIES 陣列裡
//      對應的那一行，或新增其他代理服務的網址進去。
//   3. 如果全部都失敗，畫面會自動顯示診斷面板與預設範例資料 DEMO_DATA，
//      不會整頁空白。
// ====================================================================
const FETCH_STRATEGIES = [
  // 1) 直接抓取（最快、最穩定，Google 發布的 CSV 連結通常允許跨網域讀取）
  { name: '直接抓取', buildUrl: (url) => url },
  // 2) 【可更動】備援代理 A：allorigins（穩定度高，免費額度大）
  { name: '代理 allorigins', buildUrl: (url) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url) },
  // 3) 【可更動】備援代理 B：corsproxy.io
  { name: '代理 corsproxy.io', buildUrl: (url) => 'https://corsproxy.io/?' + encodeURIComponent(url) },
  // 4) 【可更動】備援代理 C：codetabs（另一個常見免費代理，多一層保險）
  { name: '代理 codetabs', buildUrl: (url) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url) },
  // 【可更動】要新增其他代理服務，依照上面格式繼續往下加一行即可
];

// 幫網址加上時間戳參數，避免瀏覽器或代理伺服器快取到舊版試算表內容
function withCacheBuster(url) {
  const sep = url.includes('?') ? '&' : '?';
  return `${url}${sep}_cb=${Date.now()}`;
}

async function loadSheet() {
  const targetUrl = withCacheBuster(SHEET_CSV_URL);
  let text = null;
  let lastError = null;

  // 依序嘗試每一種抓取策略，成功一個就停止
  for (const strategy of FETCH_STRATEGIES) {
    try {
      const fetchUrl = strategy.buildUrl(targetUrl);
      const r = await fetch(fetchUrl, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const candidate = await r.text();

      // 簡單驗證抓回來的內容像不像一份 CSV／表格資料，
      // 避免代理伺服器回傳的是錯誤頁面(HTML)卻被誤判成功
      if (!candidate || candidate.trim().length === 0) throw new Error('回應內容為空');
      if (/^\s*<(!doctype|html)/i.test(candidate)) throw new Error('回應內容是 HTML 頁面，不是 CSV');

      text = candidate;
      debugInfo.push(`✅ 使用「${strategy.name}」成功讀取資料`);
      break;
    } catch (e) {
      lastError = e;
      debugInfo.push(`⚠ 「${strategy.name}」失敗：${e.message}`);
    }
  }

  try {
    if (text === null) throw lastError || new Error('所有抓取方式皆失敗');

    rawLines = text.split('\n');

    const allRows = parseCSVFull(text);
    debugInfo.push(`共解析到 ${allRows.length} 列`);

    let headerRowIdx = -1;
    for (let i = 0; i < allRows.length; i++) {
      const joined = allRows[i].join(',');
      if (normalize(joined).includes('拆卡者') || normalize(joined).includes('拆卡')) {
        headerRowIdx = i;
        break;
      }
    }

    if (headerRowIdx === -1) {
      debugInfo.push('⚠ 找不到標題列！前5列內容：');
      allRows.slice(0,5).forEach((r,i) => debugInfo.push(`列${i+1}: ${r.slice(0,4).join(' | ')}`));
      allData = [];
      showInitState(true);
      return;
    }

    headers = allRows[headerRowIdx].map(h => h.trim());
    debugInfo.push(`標題列在第 ${headerRowIdx+1} 列`);
    debugInfo.push(`欄位：${headers.filter(h=>h).join(' | ')}`);

    allData = [];
    for (let i = headerRowIdx + 1; i < allRows.length; i++) {
      const cells = allRows[i];
      const nameColIdx = headers.findIndex(h => normalize(h).includes('拆卡者') || normalize(h).includes('拆卡'));
      const nameVal = nameColIdx >= 0 ? (cells[nameColIdx]||'').trim() : '';
      if (!nameVal) continue; 

      const obj = {};
      headers.forEach((h, j) => { obj[h] = (cells[j] || '').trim(); });
      allData.push(obj);
    }

    debugInfo.push(`有效資料 ${allData.length} 筆`);
    showInitState(false);
  } catch(e) {
    debugInfo.push('❌ 讀取失敗：' + e.message);
    allData = DEMO_DATA;
    headers = Object.keys(DEMO_DATA[0]);
    showInitState(true);
  }
}

// ── 頁面狀態顯示器 ──
function showInitState(showDebug) {
  let dbg = '';
  if (showDebug || allData.length === 0) {

      <div class="debug-panel" id="debugPanel" style="display:none">

        ${debugInfo.map(l=>`<div>${l}</div>`).join('')}

        ${rawLines.slice(0,5).map((l,i)=>`<div>列${i+1}: ${l.slice(0,80)}</div>`).join('')}

function toggleDebug() {
  const p = document.getElementById('debugPanel');
  const btn = document.querySelector('.debug-toggle');
  if (p.style.display==='none') { p.style.display='block'; btn.textContent='🔧 隱藏診斷資訊'; }
  else { p.style.display='none'; btn.textContent='🔧 顯示診斷資訊'; }
}

function getVal(row, ...keywords) {
  const col = findCol(Object.keys(row), ...keywords);
  return col ? (row[col] || '') : '';
}

// ── 搜尋機制 ──
function getMatches(query) {
  const q = normalize(query);
  if (!q) return [];
  return allData.filter(r => {
    const name = normalize(getVal(r, '拆卡者', '拆卡', '名稱', 'name'));
    return name.includes(q);
  });
}

function showSuggestions(query) {
  const list = document.getElementById('suggestList');
  const matches = getMatches(query);
  const names = [...new Set(matches.map(r => getVal(r,'拆卡者','拆卡','名稱','name')))];
  if (!names.length || (names.length===1 && normalize(names[0])===normalize(query))) {
    list.style.display='none'; return;
  }
  list.innerHTML = names.slice(0,8).map(n =>
    `<div class="suggest-item" onclick="selectName(this.dataset.name)" data-name="${n.replace(/"/g,'&quot;')}">🌸 ${n}</div>`
  ).join('');
  list.style.display='block';
}

function selectName(name) {
  document.getElementById('searchInput').value = name;
  document.getElementById('suggestList').style.display='none';
  document.getElementById('clearBtn').style.display='block';
  renderResults(getMatches(name));
}

function search(query) {
  const q = query.trim();
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  if (!q) {
    document.getElementById('suggestList').style.display='none';
    showInitState(false);
    return;
  }
  showSuggestions(q);
  renderResults(getMatches(q));
}

// ── 付款標籤樣式輔助函式 ──
function payClass(way) {
  if (!way) return '';
  if (way.includes('匯款')) return 'pay-匯款';
  if (way.includes('貨')) return 'pay-貨付';
  if (way.includes('無卡')) return 'pay-無卡';
  if (way.includes('尚未')) return 'pay-尚未付款';
  return '';
}
function payLabel(way) {
  if (!way) return '';
  if (way.includes('匯款')) return '💳 匯款';
  if (way.includes('貨')) return '📦 貨到付款';
  if (way.includes('無卡')) return '📱 無卡支付';
  if (way.includes('尚未')) return '⏳ 尚未付款';
  return way;
}

function itemStatusBadge(row) {
  const way = getVal(row,'付款方式','付款');
  const unpaid = parseMoney(getVal(row,'尚未付款','未付款','未付'));
  if (way.includes('尚未')) return {cls:'dot-pending', label:'⏳ 待付款'};
  if (way.includes('貨')) return {cls:'dot-pending', label:'📦 到貨付'};
  if (unpaid === 0) return {cls:'dot-paid', label:'✓ 已結清'};
  return {cls:'dot-unpaid', label:`⚠ 欠 NT$${unpaid.toLocaleString()}`};
}

// ── 渲染 UI 顯示搜尋結果 ──
function renderResults(rows) {
  if (!rows.length) {
    document.getElementById('mainContent').innerHTML =
      `<div class="no-result">找不到此名稱的拆卡紀錄 🌸<br><span style="font-size:0.8rem">請確認名稱是否正確，或嘗試輸入部分名稱</span></div>`;
    return;
  }

  const row = rows[0];
  const name    = getVal(row,'拆卡者','拆卡','名稱');
  const payWay  = getVal(row,'付款方式','付款');
  const total   = parseMoney(getVal(row,'總金額','金額'));
  const paid    = parseMoney(getVal(row,'已經付款','已付款','已付'));
  const unpaid  = parseMoney(getVal(row,'尚未付款','未付款','未付'));
  const status  = getVal(row,'貨品狀態','狀態');
  const note    = getVal(row,'備註','note','remark');
  const rawItems= getVal(row,'卡面','成員','商品','品項','明細');

  const itemLines = rawItems.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0);

  const initial = (name.charAt(0)||'?').toUpperCase();
  const badge = itemStatusBadge(row);

  let html = `
    <div class="customer-header">
      <div class="avatar">${initial}</div>
      <div>
        <div class="customer-name">${name}</div>
        ${status ? `<div class="customer-tag">${status}</div>` : ''}
        ${payWay ? `<span class="pay-badge ${payClass(payWay)}">${payLabel(payWay)}</span>` : ''}
      </div>
    </div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">購買總金額</div>
        <div class="value">NT$${total.toLocaleString()}</div>
      </div>
      <div class="summary-card paid">
        <div class="label">已付款</div>
        <div class="value">NT$${paid.toLocaleString()}</div>
      </div>
      <div class="summary-card unpaid">
        <div class="label">尚未付款</div>
        <div class="value">NT$${unpaid.toLocaleString()}</div>
      </div>
    </div>`;

  if (itemLines.length) {
    html += `<div class="section-title">拆卡品項明細</div><div class="items-list">`;
    itemLines.forEach((line) => {
      const clean = line.replace(/^\s*\d+[.\uff0e]\s*/,'').trim();
      if (!clean) return;
      // 【拆卡明細→圖鑑連結】依品項文字比對出對應的 gallery.html 連結
      const galleryUrl = getGalleryLinkForItem(clean);
      html += `
        <div class="item-row clickable" onclick="window.open('${galleryUrl}', '_blank')" title="點擊查看此品項的拆卡圖鑑">
          <div class="item-number">✨</div>
          <div class="item-desc">
            ${clean}
            <div class="item-confirm">已登記</div>
            <div class="item-link-hint">🖼️ 點擊查看拆卡圖鑑 →</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  if (note) {
    html += `<div class="remark-box"><div class="remark-label">備註</div>${note}</div>`;
  }

  html += `
    <div class="catalog-section">
      <div class="catalog-info">
        <div class="catalog-label">小卡圖鑑</div>
        <div class="catalog-title">ITZY 專輯與周邊紀錄庫</div>
        <div class="catalog-sub">點擊查看你的小卡完整圖鑑</div>
      </div>
      <a class="catalog-btn" href="${CATALOG_URL}" target="_blank" rel="noopener">前往圖鑑 →</a>
    </div>`;

  document.getElementById('mainContent').innerHTML = html;
}
